<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Book Tickets</title>
</head>
<style>
	main {
		height: 90vh;
		width: 100%;
		background-image: -webkit-linear-gradient(rgb(187, 187, 203), rgb(8, 8, 54));
	}

	nav {

		height: 60px;
		width: 100%;
	}

	#yashu {
		display: flex;
		justify-content: space-around;
		align-items: center;
		height: 100%;
	}

	button {
		height: 40px;
		width: 100px;
		background-color: rgb(8, 8, 54);
		color: white;
		border-radius: 10px;
		border: none;
		cursor: pointer;
		font-size: 16px;
	}

	a {
		text-decoration: none;
		color: whitesmoke;
	}
</style>


<body>
	<main>
		<nav>
			<div id="yashu">
				<a href="/" th:align="center">
					<h1> 🎟️Book My Tickets</h1>
				</a>


				<div th:if="${pass!=null || fail!=null}" class="message">
					<h3 style="color: green" th:text="${pass}"></h3>
					<h3 style="color: red" th:text="${fail}"></h3>
				</div>

				<div align="center" th:if="${session.user==null}">
					<a href="/login"><button>Login</button></a> <a href="/register"><button>Register</button></a>
				</div>
				<div align="center" th:if="${session.user}">
					<a href="logout"><button>Lagout</button></a>
				</div>
			</div>
			<hr>
		</nav>
	</main>
</body>

</html>
